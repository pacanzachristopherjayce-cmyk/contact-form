<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="p-4">

    <form>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-control form-control-lg bg-primary-subtle"
                    aria-label="Full Name" />
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control form-control-sm bg-success-subtle"
                    aria-label="Email Address" />
            </div>
        </div>

        <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" class="form-control bg-info-subtle" rows="4" aria-label="Message"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Preferred Contact Method</label><br />
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkEmail" aria-label="Email" />
                <label class="form-check-label" for="chkEmail">Email</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkPhone" aria-label="Phone" />
                <label class="form-check-label" for="chkPhone">Phone</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkWhatsApp" aria-label="WhatsApp" />
                <label class="form-check-label" for="chkWhatsApp">WhatsApp</label>
            </div>
        </div>

        <div class="mb-3">
            <label for="favColor" class="form-label">Favorite Color</label>
            <input type="color" id="favColor" class="form-control form-control-color" aria-label="Favorite Color" />
        </div>

        <div class="mb-3">
            <label for="userId" class="form-label">User ID</label>
            <input type="text" id="userId" class="form-control" value="2025-00847" disabled aria-label="User ID" />
        </div>

        <div class="mb-3">
            <label for="accountType" class="form-label">Account Type</label>
            <input type="text" id="accountType" class="form-control-plaintext" value="Student" readonly
                aria-label="Account Type" />
        </div>

        <button type="submit" class="btn btn-outline-primary">Submit</button>

    </form>

</body>

</html>
